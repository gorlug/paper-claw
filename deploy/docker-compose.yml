services:
  paperclaw:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      - otelcol
    volumes:
      - paperclaw-state:/data
      - ./paperclaw.yaml:/etc/paperclaw/paperclaw.yaml:ro
    environment:
      # Secrets injected at runtime (e.g. via Infisical or a .env file).
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OAUTH_CLIENT_SECRET: "${OAUTH_CLIENT_SECRET}"
      # OTEL configuration — points to the local Collector.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otelcol:4317"
      OTEL_SERVICE_NAME: "paperclaw"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"

  otelcol:
    image: otel/opentelemetry-collector-contrib:latest
    restart: unless-stopped
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      DASH0_AUTH_TOKEN: "${DASH0_AUTH_TOKEN}"
    ports:
      # Expose OTLP/gRPC only on loopback — paperclaw reaches it via the
      # internal Docker network using the service name "otelcol".
      - "127.0.0.1:4317:4317"

volumes:
  paperclaw-state:
