version: "2"

linters:
  enable:
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - revive
    - staticcheck
    - unparam
    - unused
  exclusions:
    rules:
      - path: "main\\.go"
        text: "should have a package comment"
        linters:
          - revive
      - path: 'cmd/paperclaw/main_test\.go'
        linters:
          - gosec
          - errcheck
          - unparam

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - paper-claw

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
